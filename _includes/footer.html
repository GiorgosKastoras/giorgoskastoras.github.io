<footer class="footer" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
  <!-- Social Icons (left) -->
  <div style="font-size: 1.2rem;">
    <a href="https://github.com/GiorgosKastoras" target="_blank">
      <i class="fab fa-github"></i>
    </a>&nbsp;&nbsp;
    <a href="https://linkedin.com/in/your-linkedin-handle" target="_blank">
      <i class="fab fa-linkedin"></i>
    </a>&nbsp;&nbsp;
    <a href="mailto:giorgos.kastoras@gmail.com">
      <i class="fas fa-envelope"></i>
    </a>
  </div>

  <!-- Year (right) -->
  <span class="footer_item" style="font-size: 1rem;">&copy; {{ site.time | date: "%Y" }}</span>

  <!-- Theme credit (below) -->
  <small class="footer_copyright" style="width: 100%; text-align: center; margin-top: 0.5rem;">
    <a
      href="https://github.com/piharpi/jekyll-klise"
      target="_blank"
      rel="noreferrer noopener"
    >klisé</a> theme on
    <a href="https://jekyllrb.com" target="_blank" rel="noreferrer noopener">jekyll</a>
  </small>
</footer>

<script src="/assets/js/main.js" defer="defer"></script>

{%- if site.google_analytics -%}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "{{ site.google_analytics }}");
  </script>
{%- endif -%}

{%- if page.url == '/archive/' -%}
  <script src="/assets/js/search.min.js"></script>
  <script>
    var sjs = SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('search-results'),
      json: '/assets/search.json',
    });
  </script>
{%- endif -%}
